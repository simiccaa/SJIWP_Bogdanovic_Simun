<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
          body {
      padding: 0;
      margin: 10px;
      
    }

    .container{
    margin: 20px;
    
    height: 50vh;
    width: 100vh;
    display: grid;
    
    }
     p{
        position: absolute;
        margin-left: 80px;
        margin-top: 80px;
        font-size: 25px;
    }
        .a3{
        position: relative;
        background-color: #606060;
        margin: 10px;
        border-radius: 5%;
        color: white;
        grid-column-start: 1;
        grid-column-end: 3;
        
        
    }
    .b3{
        position: relative;
        margin: 10px;
        background-color: #606060;
        border-radius: 5%;
        color: white;
        grid-column-start: 3;
        grid-column-end: 5;
       
    }
    .c3{
        position: relative;
        background-color: #606060;
        margin: 10px;
        border-radius: 5%;
        color: white;
    }
    .d3{
        position: relative;
        background-color: #606060;
        margin: 10px;
        border-radius: 5%;
        color: white;
        grid-column-start: 2;
        grid-column-end: 5;
    }
    .e3{
        position: relative;
        background-color: #606060;
        border-radius: 5%;
        color: white;
        margin: 10px;
        grid-row-start: 3;
        grid-column-start: 1;
        grid-column-end: 5;
    }
    
    </style>
</head>
<body>
    <h2>zad 5</h2>
    <div class="container">
        <div class="a3"><p>A</p></div>
        <div class="b3"><p>B</p></div>
        <div class="c3"><p>C</p></div>
        <div class="d3"><p>D</p></div>
        <div class="e3"><p>E</p></div>
    </div>
    
</body>
</html>
